<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissu Shop — ანგარიში გაყინულია</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        * { box-sizing: border-box; }
        html, body { margin:0; padding:0; font-family:"Inter var","Inter",system-ui,sans-serif;
            background:#F8F7F4; color:#17140E; min-height:100vh; display:flex;
            align-items:center; justify-content:center; padding:24px; }
        .card { background:#FFF; border:1px solid #ECE7DF; border-radius:14px;
            padding:48px 40px; max-width:460px; width:100%;
            box-shadow:0 2px 20px rgba(23,20,14,.04); text-align:center; }
        .icon { font-size:56px; margin-bottom:16px; }
        h1 { margin:0 0 12px; font-size:24px; font-weight:600; letter-spacing:-0.01em; }
        p { color:#4A443B; font-size:15px; line-height:1.6; margin:0 0 12px; }
        .muted { color:#8B8478; font-size:13px; margin-top:24px; }
        .btn { display:inline-block; margin-top:16px; padding:10px 20px;
            background:#ECE7DF; color:#17140E; border-radius:8px; text-decoration:none;
            font-size:14px; font-weight:500; }
        .btn:hover { background:#D8D2C7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>ანგარიში გაყინულია</h1>
        <p>ამ ანგარიშის გამოწერა არასრულია — გადახდის დადასტურების შემდეგ ანგარიში ისევ ამუშავდება.</p>
        <p>თუ გადახდა უკვე გააკეთეთ, მოგვწერეთ.</p>
        <div class="muted">Tissu Platform</div>
        <a class="btn" href="/admin/logout">გამოსვლა</a>
    </div>
</body>
</html>
