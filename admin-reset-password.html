<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissu Shop — ახალი პაროლი</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        * { box-sizing: border-box; }
        html, body { margin:0; padding:0; font-family: "Inter var", "Inter", system-ui, sans-serif;
            background:#F8F7F4; color:#17140E; min-height:100vh; }
        body { display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:#FFF; border:1px solid #ECE7DF; border-radius:14px;
            padding:40px 36px 32px; width:100%; max-width:400px;
            box-shadow:0 2px 20px rgba(23,20,14,.04); }
        h1 { margin:0 0 8px; font-size:22px; font-weight:600; letter-spacing:-0.01em; }
        .subtitle { margin:0 0 28px; font-size:14px; color:#8B8478; }
        label { display:block; margin-bottom:6px; font-size:13px; font-weight:500; color:#4A443B; }
        input[type=password] { width:100%; padding:10px 12px; border:1px solid #D8D2C7;
            border-radius:8px; font-size:15px; font-family:inherit; background:#FBFAF7; }
        input:focus { outline:none; border-color:#1F1B16; background:#FFF; }
        .field { margin-bottom:18px; }
        button { width:100%; padding:12px 16px; background:#1F1B16; color:#FBFAF7;
            border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; }
        button:hover { background:#000; }
        .error { padding:10px 12px; background:#F7E1DE; color:#7F2A24;
            border-radius:8px; font-size:13px; margin-bottom:18px; display:none; }
        .error.visible { display:block; }
        .footer { margin-top:24px; text-align:center; font-size:13px; color:#8B8478; }
        .footer a { color:#4A443B; text-decoration:none; border-bottom:1px solid #D8D2C7; }
    </style>
</head>
<body>
    <form class="card" method="post" action="/admin/reset-password">
        <h1>ახალი პაროლი</h1>
        <p class="subtitle">შეარჩიე ახალი პაროლი ანგარიშისთვის — მინიმუმ 8 სიმბოლო.</p>
        <div class="error" id="errorBox"></div>
        <input type="hidden" name="token" id="token" value="">
        <div class="field">
            <label for="password">ახალი პაროლი</label>
            <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="password2">ხელახლა შეიყვანე</label>
            <input type="password" id="password2" name="password2" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit">პაროლის შენახვა</button>
        <div class="footer"><a href="/admin/login">← შესვლაზე დაბრუნება</a></div>
    </form>
    <script>
        // Token comes in the URL query string (?token=…). Copy it into
        // the hidden form field so POST carries it.
        const params = new URLSearchParams(window.location.search);
        const tok = params.get('token') || '';
        document.getElementById('token').value = tok;
        const err = params.get('error');
        const e = document.getElementById('errorBox');
        if (err === 'invalid') {
            e.textContent = 'ბმული არასწორია ან ვადა გაუვიდა. სცადე ახლიდან „დაგავიწყდა პაროლი?"';
            e.classList.add('visible');
        } else if (err === 'mismatch') {
            e.textContent = 'პაროლები არ ემთხვევა.';
            e.classList.add('visible');
        } else if (err === 'short') {
            e.textContent = 'პაროლი მინიმუმ 8 სიმბოლო უნდა იყოს.';
            e.classList.add('visible');
        }
    </script>
</body>
</html>
