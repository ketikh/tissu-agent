<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissu Shop — პაროლის აღდგენა</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        * { box-sizing: border-box; }
        html, body { margin:0; padding:0; font-family: "Inter var", "Inter", system-ui, sans-serif;
            background:#F8F7F4; color:#17140E; min-height:100vh; }
        body { display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:#FFF; border:1px solid #ECE7DF; border-radius:14px;
            padding:40px 36px 32px; width:100%; max-width:400px;
            box-shadow:0 2px 20px rgba(23,20,14,.04); }
        h1 { margin:0 0 8px; font-size:22px; font-weight:600; letter-spacing:-0.01em; }
        .subtitle { margin:0 0 28px; font-size:14px; color:#8B8478; }
        label { display:block; margin-bottom:6px; font-size:13px; font-weight:500; color:#4A443B; }
        input[type=email] { width:100%; padding:10px 12px; border:1px solid #D8D2C7;
            border-radius:8px; font-size:15px; font-family:inherit; background:#FBFAF7; }
        input:focus { outline:none; border-color:#1F1B16; background:#FFF; }
        .field { margin-bottom:18px; }
        button { width:100%; padding:12px 16px; background:#1F1B16; color:#FBFAF7;
            border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; }
        button:hover { background:#000; }
        .info, .error { padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:18px; }
        .info { background:#E0F0E8; color:#1F4A38; display:none; }
        .info.visible, .error.visible { display:block; }
        .error { background:#F7E1DE; color:#7F2A24; display:none; }
        .footer { margin-top:24px; text-align:center; font-size:13px; color:#8B8478; }
        .footer a { color:#4A443B; text-decoration:none; border-bottom:1px solid #D8D2C7; }
    </style>
</head>
<body>
    <form class="card" method="post" action="/admin/forgot-password">
        <h1>დაგავიწყდა პაროლი?</h1>
        <p class="subtitle">მოგვწერე შენი ელფოსტა და გაგიგზავნით ბმულს პაროლის განახლებისთვის.</p>
        <div class="info" id="info">თუ ამ ელფოსტით ანგარიში არსებობს, ბმული გაიგზავნება 1-2 წუთში ✨</div>
        <div class="error" id="errorBox"></div>
        <div class="field">
            <label for="email">ელფოსტა</label>
            <input type="email" id="email" name="email" required autocomplete="username" autofocus>
        </div>
        <button type="submit">ბმულის გაგზავნა</button>
        <div class="footer"><a href="/admin/login">← შესვლაზე დაბრუნება</a></div>
    </form>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('sent') === '1') {
            document.getElementById('info').classList.add('visible');
        }
        if (params.get('error') === 'rate') {
            const e = document.getElementById('errorBox');
            e.textContent = 'ძალიან ბევრი მცდელობა. გთხოვთ მოიცადოთ 1 საათი.';
            e.classList.add('visible');
        }
    </script>
</body>
</html>
